<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Quên mật khẩu</h2>

    <form id="forgotPasswordForm">
        <input type="email" id="email" placeholder="Nhập email" required>
        <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" required>
        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
        <button type="submit">Đổi mật khẩu</button>
    </form>

    <div id="message"></div>

    <a href="/login.html">Quay lại đăng nhập</a>
</div>

<script>
    document.getElementById("forgotPasswordForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        const params = new URLSearchParams();
        params.append("email", email);
        params.append("newPassword", newPassword);
        params.append("confirmPassword", confirmPassword);

        const response = await fetch("/api/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: params
        });

        const result = await response.text();
        const msg = document.getElementById("message");
        msg.innerText = result;

        if (result.toLowerCase().includes("thành công")) {
            msg.style.color = "green";
            setTimeout(() => {
                window.location.href = "/login.html";
            }, 1500);
        } else {
            msg.style.color = "red";
        }
    });
</script>
</body>
</html>
