<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create / Update Promotions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1, h2 {
            margin-bottom: 15px;
        }

        input, textarea {
            display: block;
            width: 320px;
            margin-bottom: 10px;
            padding: 8px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #999;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        .action-btn {
            margin-right: 5px;
        }
    </style>
</head>
<body>

<h1>Create / Update Promotions</h1>

<h2>Create / Update Promotion</h2>

<input type="hidden" id="promotionId">

<input type="text" id="code" placeholder="Promotion Code">
<input type="text" id="title" placeholder="Title">
<textarea id="description" placeholder="Description"></textarea>
<input type="number" id="discountPercent" placeholder="Discount Percent">
<input type="date" id="startDate">
<input type="date" id="endDate">

<label>
    <input type="checkbox" id="active" checked>
    Active
</label>

<button onclick="savePromotion()">Save Promotion</button>
<button onclick="resetForm()">Clear</button>

<h2>Promotion List</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Code</th>
        <th>Title</th>
        <th>Description</th>
        <th>Discount %</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Active</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="promotionTableBody"></tbody>
</table>

<script>
    async function loadPromotions() {
        const response = await fetch('/api/promotions');
        const promotions = await response.json();

        const tableBody = document.getElementById('promotionTableBody');
        tableBody.innerHTML = '';

        promotions.forEach(promotion => {
            const row = `
                <tr>
                    <td>${promotion.id}</td>
                    <td>${promotion.code || ''}</td>
                    <td>${promotion.title || ''}</td>
                    <td>${promotion.description || ''}</td>
                    <td>${promotion.discountPercent ?? 0}</td>
                    <td>${promotion.startDate || ''}</td>
                    <td>${promotion.endDate || ''}</td>
                    <td>${promotion.active}</td>
                    <td>
                        <button class="action-btn" onclick='editPromotion(${JSON.stringify(promotion)})'>Edit</button>
                        <button class="action-btn" onclick='deletePromotion(${promotion.id})'>Delete</button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    async function savePromotion() {
        const id = document.getElementById('promotionId').value;

        const promotion = {
            code: document.getElementById('code').value,
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            discountPercent: parseFloat(document.getElementById('discountPercent').value) || 0,
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value,
            active: document.getElementById('active').checked
        };

        let url = '/api/promotions';
        let method = 'POST';

        if (id) {
            url = `/api/promotions/${id}`;
            method = 'PUT';
        }

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(promotion)
        });

        if (response.ok) {
            alert(id ? 'Update promotion successfully' : 'Create promotion successfully');
            resetForm();
            loadPromotions();
        } else {
            alert('Save promotion failed');
        }
    }

    function editPromotion(promotion) {
        document.getElementById('promotionId').value = promotion.id;
        document.getElementById('code').value = promotion.code || '';
        document.getElementById('title').value = promotion.title || '';
        document.getElementById('description').value = promotion.description || '';
        document.getElementById('discountPercent').value = promotion.discountPercent ?? 0;
        document.getElementById('startDate').value = promotion.startDate || '';
        document.getElementById('endDate').value = promotion.endDate || '';
        document.getElementById('active').checked = promotion.active;
    }

    async function deletePromotion(id) {
        if (!confirm('Are you sure you want to delete this promotion?')) {
            return;
        }

        const response = await fetch(`/api/promotions/${id}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            alert('Delete promotion successfully');
            loadPromotions();
        } else {
            alert('Delete promotion failed');
        }
    }

    function resetForm() {
        document.getElementById('promotionId').value = '';
        document.getElementById('code').value = '';
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('discountPercent').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('active').checked = true;
    }

    loadPromotions();
</script>

</body>
</html>
