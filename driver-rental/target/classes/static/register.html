<!DOCTYPE html>
<html>
<body>
<h1>Register</h1>

<input type="text" id="fullName" placeholder="Full Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<input type="text" id="phone" placeholder="Phone"><br><br>
<input type="text" id="address" placeholder="Address"><br><br>

<label>
    <input type="checkbox" id="acceptedTerms"> I accept terms and conditions
</label>
<br><br>

<button onclick="register()">Register</button>
<button onclick="resendVerification()">Resend Verification</button>

<p id="result"></p>

<script>
    function register() {
        const data = {
            fullName: document.getElementById("fullName").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            phone: document.getElementById("phone").value,
            address: document.getElementById("address").value,
            acceptedTerms: document.getElementById("acceptedTerms").checked
        };

        fetch("http://localhost:8080/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            })
            .catch(err => {
                document.getElementById("result").innerText = "Error: " + err;
            });
    }

    function resendVerification() {
        const data = {
            email: document.getElementById("email").value
        };

        fetch("http://localhost:8080/api/auth/resend-verification", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            })
            .catch(err => {
                document.getElementById("result").innerText = "Error: " + err;
            });
    }
</script>

</body>
</html>
